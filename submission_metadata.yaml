compute:
  platform: "Windows 11 / local"
  cpu_cores: 8
  ram_gb: 16
  python_version: "3.10.11"
  os: "Windows"
  uses_gpu_for_inference: false
  has_network_during_ranking: false
  pre_computation_required: true
  pre_computation_time_minutes: 120

methodology_summary: |
  Offline feature store over 100K profiles (career evidence, company lexicon,
  behavioral signals, honeypot consistency flags). Hybrid lexical retrieval
  (BM25 + TF-IDF dense + JD BM25 proxy reranker) without hosted APIs.
  Pseudo-teacher rubric labels a high-recall pool; LightGBM lambdarank student
  with monotone behavioral constraints and seed ensemble. rank.py streams the
  pool, applies honeypot triple-guard, predicts, attaches verified reasoning
  cache. Replay ~52s/100K CPU. Metrics: docs/RESULTS.md.

declarations:
  read_submission_spec: true
  code_is_original_work: true
  no_collusion: true
  honeypot_check_done: true
  reproduction_tested: true

# Legacy block (repo tooling)
submission:
  reproduce_command: "python rank.py --candidates ./data/candidates.jsonl --out ./submission.csv"
  validate_command: "python validate_submission.py submission.csv"
  python_version: "3.10"
  dependencies: requirements.txt
  output_csv: submission.csv

artifacts:
  shipped_via: "Git LFS or local build via scripts/run_pipeline_no_api.py"
  contents:
    - artifacts/features.parquet
    - artifacts/model/
    - artifacts/reasoning.json
    - artifacts/audit_flags.json
    - artifacts/founding_years.csv

reproducibility:
  deterministic: true
  seeds_pinned: true
  recency_reference: "max(last_active_date) across the pool"
